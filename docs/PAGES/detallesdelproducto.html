<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Producto</title>
    <!--LINK DE STILOS-->
    <link rel="stylesheet" href="../STYLES/estilodp.css">
</head>
<body>

  <!--NAVBAR-->

  <header class="navbar">
        <div class="logo">ONEMARKET</div>

        <input type="text" placeholder="Buscar Productos..." class="search">

        <div class="nav-actions">
            <span class="cart" onclick="window.location.href='../PAGES/carrito.html'">🛒</span>
            <button class="Perfil" onclick="window.location.href='../PAGES/perfil.html'">
              👤
            </button>

        </div>

  </header>
    
    <section class="producto">
    
        <div class="producto-contenedor">

           <!-- IMAGEN -->
           <div class="producto-img">
             <img src="" alt="IMAGEN">
           </div>

           <!-- INFO -->
            <div class="producto-info">

              <span class="categoria">CATEGORIA</span>

              <h2>PRUDUCTO XX1XX</h2>

                <div class="rating">
                   ★★★★☆
                </div>

              <p class="precio">$ 00.0000</p>

                <div class="descripcion">
                   <h4>Descripcion</h4>
                    <p>
                      BREVE ANOTACION ACERCA DEL ARTICULO .
                    </p>
                </div>

              <button class="btn-carrito" onclick="window.location.href='../PAGES/carritoconproducto.html'">Agregar al carrito</button>

            </div>

        </div>

      <hr>

  </section>

  <section class="relacionados">

    <h3>Artículos parecidos</h3>

    <div class="relacionados-contenedor">

      <div class="card" onclick="window.location.href='PAGES/DETALLESDELPRODUCTO.HTML'">
        <img src="../IMAGE/sueter blanco overside.png" alt="">
        <h3>Sueter Basico</h3>
        <p>$70.000</p>
        <span class="brand">Sueter</span>
        <button>Agregar al carrito</button>
      </div>

      <div class="card" onclick="window.location.href='PAGES/DETALLESDELPRODUCTO.HTML'">
        <img src="../IMAGE/sueter negro.png" alt="">
        <h3>Sueter Basico Negra</h3>
        <p>$70.000</p>
        <span class="brand">Sueter</span>
        <button>Agregar al carrito</button>
      </div>

      <div class="card" onclick="window.location.href='PAGES/DETALLESDELPRODUCTO.HTML'">
        <img src="../IMAGE/camisa blanca.png" alt="">
        <h3>Camisa Blanca</h3>
        <p>$45.000</p>
        <span class="brand">Camisa</span>
        <button>Agregar al carrito</button>
      </div>

      <div class="card" onclick="window.location.href='PAGES/DETALLESDELPRODUCTO.HTML'">
        <img src="../IMAGE/camisa tipo polo negra.png" alt="">
        <h3>Camisa Polo Negra</h3>
        <p>$90.000</p>
        <span class="brand">Polo</span>
        <button>Agregar al carrito</button>
      </div>

      <div class="card" onclick="window.location.href='PAGES/DETALLESDELPRODUCTO.HTML'">
        <img src="../IMAGE/pantalon vaquero azul blanco.png" alt="">
        <h3>Jean Pierna Recta </h3>
        <p>$120.000</p>
        <span class="brand">Jean</span>
        <button>Agregar al carrito</button>
      </div>

    </div>

  </section>

</html>
