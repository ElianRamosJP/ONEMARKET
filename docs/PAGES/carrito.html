<!DOCTYPE html>
<html lang="es">
<head>

    <title>Carrito</title>
    <link rel="stylesheet" href="../STYLES/estiloco.css">
</head>

        </div>

        <div class="nav-actions">
            <button class="perfil" onclick="window.location.href='../PAGES/perfil.html'">

            </button>
        </div>
    </header>

    <!-- CARRITO VACÍO -->
    <section class="vacio">

        <div class="avatar">
          🛒
        </div>

        <h1>Tu carrito está vacío</h1>

        <p>¡Comienza a agregar productos para comprar!</p>

        <button class="explorar_productos"
            onclick="window.location.href='../PAGES/explorarproducto.html'">

    <!-- FOOTER -->

                    <a href="../PAGES/mispedidos.html">Mis Pedidos</a>

            <div class="footer-social">

                <div class="icons">

                    <span>💼</span>
