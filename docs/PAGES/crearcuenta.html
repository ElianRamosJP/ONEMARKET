<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEMARKET</title>
    <!--LINK DE STILOS-->
    <link rel="stylesheet" href="../STYLES/estilocc.css">
</head>
<body>

    <header class="navbar">
      <div class="logo">ONEMARKET </div> 
    </header>

    <section class="registro">

        <div class="registro-header">
          <h2>Crear Cuenta</h2>
          <p>Únete a ONEMARKET hoy</p>
        </div>

        <div class="registro-box">

          <h3>Registro de Usuario</h3>
          <p class="sub">Completa el formulario para crear tu cuenta</p>

            <!-- INFO CUENTA -->
           <h4>Información de Cuenta</h4>

            <div class="grid-2">
                <div>
                  <label>EMAIL *</label>
                  <input type="email">
                </div>

                <div>
                  <label>USUARIO *</label>
                  <input type="text">
                </div>
            </div>

            <div class="grid-1">
              <label>CONTRASEÑA *</label>
              <input type="password">
            </div>

            <!-- INFO PERSONAL -->
            <h4>Información Personal</h4>

            <div class="grid-2">
                <div>
                   <label>NOMBRE *</label>
                   <input type="text">
                </div>

                <div>
                   <label>APELLIDOS *</label>
                   <input type="text">
                </div>
            </div>

            <div class="grid-1">
              <label>TELEFONO *</label>
              <input type="text">
            </div>

           <!-- DIRECCIÓN -->
           <h4>Dirección</h4>

           <div class="grid-2">
               <div>
                   <label>CALLE *</label>
                   <input type="text">
                </div>

                <div>
                  <label>NUMERO *</label>
                  <input type="text">
                </div>
            </div>

            <div class="grid-2">
                <div>
                  <label>CIUDAD *</label>
                  <input type="text">
                </div>

                <div>
                  <label>CODIGO POSTAL *</label>
                  <input type="text">
                </div>
            </div>

           <button class="btn-registro">Registrarse</button>

            <p class="login-link">
               ¿Ya tienes cuenta? <a href="../PAGES/LOGIN.HTML">Inicia sesión aquí</a>
            </p>

        </div>

    </section>
    
</body>
</html>
